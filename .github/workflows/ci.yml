name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          clang-format --version
          find framework src tests tools \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  tests:
    name: tests + headless render (no SDL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Configure (no app, so no SDL3 needed)
        run: cmake -B build -S . -DBUILD_APP=OFF -DCMAKE_BUILD_TYPE=Debug
      - name: Build tests + headless renderer
        run: cmake --build build
      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure
      - name: Render the Cornell box headlessly
        run: ./build/render_headless assets/cornell-box.obj render
      - name: Upload rendered images
        uses: actions/upload-artifact@v4
        with:
          name: renders
          path: render-*.ppm

  app-syntax:
    name: app compile check (SDL3 headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Fetch SDL3 headers
        run: git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL
      - name: Syntax-check the application against SDL3
        run: |
          for f in src/*.cpp framework/*.cpp; do
            echo "checking $f"
            clang++ -std=c++23 -fsyntax-only -Wall -Wextra -Wno-unused-parameter -Wno-unknown-pragmas \
              -Iframework -Ithird_party -Isrc -Iinclude -I/tmp/SDL/include "$f"
          done
