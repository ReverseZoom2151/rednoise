name: Publish Python package

# Build wheels + sdist for the RedNoise Python bindings and publish to PyPI.
# Triggered when a GitHub Release is published, or manually via the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # The wheel build pulls in the parent C++ project (../..), so we need
          # the full repository, not just the bindings subdirectory.
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19.2
        with:
          package-dir: bindings/python
        env:
          # Build CPython 3.9-3.12; skip musllinux (no C++23 toolchain there).
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*musllinux*"
          # manylinux_2_28 (GCC 12) can compile C++23; the default image cannot.
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist
        working-directory: bindings/python

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: bindings/python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing (OIDC): no API token or password needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # All build jobs uploaded artifacts named cibw-*; merge them into dist/.
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # To publish to TestPyPI instead, uncomment the line below (and configure
        # a matching Trusted Publisher on TestPyPI):
        # with:
        #   repository-url: https://test.pypi.org/legacy/
