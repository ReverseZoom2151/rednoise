name: Release

# Builds headless-only binaries for Linux, macOS and Windows and attaches
# them to the GitHub Release created for a pushed v* tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
          - os: macos-latest
            os_name: macos
          - os: windows-latest
            os_name: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++23 compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          echo "CC=gcc-13" >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"

      - name: Configure (headless only)
        run: >
          cmake -S . -B build
          -DBUILD_APP=OFF
          -DBUILD_GPU=OFF
          -DBUILD_LIB=OFF
          -DBUILD_HEADLESS=ON
          -DBUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release

      # Build only the shipped binary (the `rn` CLI). The other headless tools and
      # the library each recompile the whole engine, so restricting the target is
      # the single biggest speedup for the release build.
      - name: Build Release
        run: cmake --build build --config Release --parallel --target rednoise_cli

      - name: Determine architecture
        id: arch
        shell: bash
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64|AMD64) arch=x86_64 ;;
            arm64|aarch64)      arch=arm64 ;;
          esac
          echo "arch=$arch" >> "$GITHUB_OUTPUT"

      - name: Stage package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="rednoise-${{ matrix.os_name }}-${{ steps.arch.outputs.arch }}"
          mkdir -p "$pkg"
          # Headless binaries land directly in build/ (single-config generators).
          cp build/rn "$pkg/"
          if [ -f build/render_headless ]; then cp build/render_headless "$pkg/"; fi
          cp -r assets "$pkg/"
          cp README.md "$pkg/"
          cp LICENSE "$pkg/"
          tar -czf "$pkg.tar.gz" "$pkg"
          echo "ASSET=$pkg.tar.gz" >> "$GITHUB_ENV"

      - name: Stage package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "rednoise-${{ matrix.os_name }}-${{ steps.arch.outputs.arch }}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          # Multi-config generators (MSVC) place binaries under build/Release.
          $rn = if (Test-Path "build/Release/rn.exe") { "build/Release/rn.exe" } else { "build/rn.exe" }
          Copy-Item $rn -Destination $pkg
          $rh = if (Test-Path "build/Release/render_headless.exe") { "build/Release/render_headless.exe" } elseif (Test-Path "build/render_headless.exe") { "build/render_headless.exe" } else { $null }
          if ($rh) { Copy-Item $rh -Destination $pkg }
          Copy-Item -Recurse assets -Destination "$pkg/assets"
          Copy-Item README.md -Destination $pkg
          Copy-Item LICENSE -Destination "$pkg/LICENSE"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip" -Force
          "ASSET=$pkg.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: RedNoise ${{ github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          generate_release_notes: true
