# Packaging metadata for the RedNoise Python bindings.
#
# NOTE: This package does NOT bundle the RedNoise shared library. The library
# (librednoise.so / librednoise.dylib / rednoise.dll) is built separately from
# the C++ project (cmake -DBUILD_LIB=ON) and located at runtime via the
# REDNOISE_LIBRARY environment variable or common local build paths.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rednoise"
version = "0.1.0"
description = "Pure-Python ctypes bindings for the RedNoise CPU software renderer."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
    { name = "RedNoise contributors" },
]
keywords = ["renderer", "raytracer", "pathtracer", "graphics", "ctypes"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Topic :: Multimedia :: Graphics :: 3D Rendering",
]

# No hard runtime dependencies: the binding is pure ctypes over the C ABI.
dependencies = []

[project.optional-dependencies]
# Pillow enables Image.to_pillow() and saving non-PNG formats.
pillow = ["Pillow>=8.0"]

[project.urls]
Homepage = "https://github.com/ReverseZoom2151/rednoise"
Repository = "https://github.com/ReverseZoom2151/rednoise"
Issues = "https://github.com/ReverseZoom2151/rednoise/issues"

[tool.hatch.build.targets.wheel]
packages = ["rednoise"]
